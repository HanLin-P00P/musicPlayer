<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Music Player</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        <link rel="stylesheet" href="_musicPlayer.css">
        <script src="https://kit.fontawesome.com/eef77b8299.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <div class="topBar">
            <div class="flex-fill"></div>
            <div>
                <button class="btn btn-warning allBtn">All</button>
                <button class="btn btn-warning favBtn">Favourite</button>
            </div>
        </div>
        <div class="musicContainer">
            <table class="table table0 table-striped table-border table-primary">
                <tbody>
                    <tr>
                        <td>No.</td>
                        <td>Songs Title</td>
                        <td>Add To Favourite</td>
                    </tr>
                </tbody>
                <tbody class="tableBody">

                </tbody>
            </table>
            <table class="table table1 table-striped table-border table-primary d-none">
                <tbody>
                    <tr>
                        <td>No.</td>
                        <td>Songs Title</td>
                        <td>Remove from Favourite</td>
                    </tr>
                </tbody>
                <tbody class="tableBody1 ">

                </tbody>
            </table>
            <audio src=""></audio>
        </div>
        <footer id="footer">

            <div class="musicPlayer">
                <i class="fas fa-step-backward controls previousButton"></i>
                <i class="fas fa-play-circle controls playButton"></i>
                <i class="far fa-pause-circle controls pauseButton d-none"></i>
                <i class="fas fa-step-forward controls nextButton"></i>
            </div>
        
            <div id="progressBar">
                <div id="currentProgress"></div>
            </div>
            
            <div class="currentAndTotalTime">--:-- / --:--</div>
        </footer>
        <script src="_musicPlayer.js"></script>
    </body>
</html>
